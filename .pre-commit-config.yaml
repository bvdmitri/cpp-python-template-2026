# Pre-commit hooks. Install once with `pre-commit install`, then they run on
# every commit; run on demand with `make lint`.
#
# clang-format / clang-tidy come from Python wheels (cpp-linter-hooks), so
# contributors do NOT need a manual LLVM install for formatting/linting.
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/cpp-linter/cpp-linter-hooks
    rev: v0.6.1
    hooks:
      - id: clang-format
        args: [--style=file, --version=18]
      - id: clang-tidy
        # Requires compile_commands.json — run `make configure` first.
        # Bindings are excluded: nanobind's NB_MODULE macro expands to code that
        # intentionally violates our strict checks (it's generated, not ours).
        # Only lint .cpp translation units (headers are analyzed transitively;
        # running clang-tidy on a bare header has no compile-db entry).
        args: [--version=18, -p=out/build/dev]
        # Lint the library TUs only; headers are checked transitively via
        # HeaderFilterRegex in .clang-tidy. Test files (Catch2 macros) and the
        # nanobind bindings generate code that intentionally trips strict checks.
        files: '^src/.*\.cpp$'

  # Python: ruff lint + format (mypy runs as a make/CI gate since it needs the
  # built+installed extension to resolve types).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/cmake-lint/cmake-lint
    rev: 1.4.3
    hooks:
      - id: cmakelint
        # -whitespace/indent: CMake multi-line argument indentation is stylistic
        # and already handled consistently by hand.
        args: [--linelength=100, "--filter=-readability/wonkycase,-whitespace/indent"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: [--skip, "*.lcov,out,_deps", -L, "crate,ot"]
