name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a release PR from Conventional Commits and tags releases on
      # merge, driving CHANGELOG.md and version bumps.
      - uses: googleapis/release-please-action@v4
        with:
          # release-please has no dedicated C++ type; "simple" tracks the version
          # and CHANGELOG and creates tags/releases from Conventional Commits.
          release-type: simple
