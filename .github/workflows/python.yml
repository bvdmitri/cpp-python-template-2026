name: Python

# Dedicated quality pipeline for the Python bindings: lint, strict typing, tests,
# and coverage. Separate from the C++ CI (ci.yml) but an equal first-class gate.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: ruff + mypy
    runs-on: ubuntu-latest
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - uses: actions/checkout@v7
      - uses: lukka/get-cmake@latest
      - name: Install GCC 14
        run: sudo apt-get update && sudo apt-get install -y gcc-14 g++-14
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      # Use the Makefile targets so CI matches local exactly (they pass
      # --no-editable so the built extension is importable).
      - name: Ruff lint + format check
        run: make py-lint
      - name: Mypy (strict)
        run: make py-typecheck

  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is omitted while C++26 + MSVC/CMake wheel support matures.
        os: [ubuntu-latest, macos-14]
        python: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: lukka/get-cmake@latest

      - name: Install GCC 14 (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-14 g++-14
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Select latest Xcode (macOS)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Run tests with coverage
        run: make py-coverage PY=${{ matrix.python }}

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: out/coverage/python/coverage.xml
          flags: python
          name: python-${{ matrix.os }}-py${{ matrix.python }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
