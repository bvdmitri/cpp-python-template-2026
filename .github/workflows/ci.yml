name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Cross-platform / cross-architecture build + the FULL test suite.
  # TDD is enforced here: a red test fails the job and (with branch protection)
  # blocks the merge.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Linux x86_64 (gcc-14)", os: ubuntu-latest,    preset: dev, cc: gcc-14, cxx: g++-14 }
          - { name: "Linux arm64 (gcc-14)",  os: ubuntu-24.04-arm, preset: dev, cc: gcc-14, cxx: g++-14 }
          - { name: "macOS arm64 (clang)",   os: macos-14,         preset: dev }
          - { name: "Windows x64 (msvc)",    os: windows-latest,   preset: dev }
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja + CMake
        uses: lukka/get-cmake@latest

      - name: Install GCC 14 (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y gcc-14 g++-14

      - name: Select latest Xcode (macOS)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (full suite)
        run: ctest --preset ${{ matrix.preset }}

  # ---------------------------------------------------------------------------
  # Sanitizers (Linux/clang). ASan+UBSan and TSan run as separate lanes.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: sanitizer (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [asan, tsan]
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - run: cmake --preset ${{ matrix.preset }}
      - run: cmake --build --preset ${{ matrix.preset }}
      - run: ctest --preset ${{ matrix.preset }}

  # ---------------------------------------------------------------------------
  # Coverage → Codecov (inspectable report + badge).
  # ---------------------------------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - name: Build + test with coverage
        run: make coverage
      - name: Upload C++ coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: out/coverage/coverage.lcov
          flags: cpp
          name: cpp-ubuntu
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Formatting + static analysis gate.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Generate compile database
        run: cmake --preset dev
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit (clang-format, clang-tidy, etc.)
        run: pre-commit run --all-files --show-diff-on-failure
