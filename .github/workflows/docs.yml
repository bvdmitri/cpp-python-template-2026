name: Docs

# Build the unified C++ + Python documentation (Doxygen XML -> Breathe -> Sphinx)
# and deploy it to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - uses: actions/checkout@v7
      - uses: lukka/get-cmake@latest
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Doxygen, Graphviz, GCC 14
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz gcc-14 g++-14
      - name: Build documentation
        run: make docs
      - name: Disable Jekyll on Pages
        run: touch docs/_build/html/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
