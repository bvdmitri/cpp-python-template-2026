name: Bug report
description: Report a defect in the library
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproducible example
      description: The smallest piece of code that reproduces the problem.
      render: cpp
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Compiler, version & OS
      placeholder: "e.g. GCC 16.1 on Ubuntu 24.04 (x86_64)"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Library version / commit
    validations:
      required: true
